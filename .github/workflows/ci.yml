name: CI
# OmniCAN — Zephyr RTOS west module (embedded C, Apache-2.0)
#
# GOVERNANCE BASELINE (v0.1.0)
# This release is the architecture + governance scaffold — protocol
# implementation begins in Phase 2. CI currently runs:
#   lint   — clang-format enforces code style on all C/H files (always active)
#   build  — west build per protocol variant (enabled when tests/build_check/ exists)
#   test   — west twister ztest suite (enabled when tests/ has test cases)
#
# Build and test jobs will be activated when Phase 2 (J1939) implementation
# lands. See docs/FEATURES.md for implementation status.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]  # PRs target develop; develop merges to main via PR

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ZEPHYR_VERSION: v3.7.0

jobs:
  # ---------------------------------------------------------------------------
  # clang-format lint — enforces code style on all C/H files
  # Always active — all commits must be formatted.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting (dry-run)
        run: |
          find include src -name '*.[ch]' -print0 \
            | xargs -0 clang-format --dry-run --Werror

  # ---------------------------------------------------------------------------
  # west build — verify the module compiles for each enabled protocol
  # Activated when tests/build_check/ exists (Phase 2+).
  # continue-on-error: true — stubs for governance baseline; will pass when
  # Phase 2 (J1939) implementation lands and tests/build_check/ is populated.
  # ---------------------------------------------------------------------------
  build:
    needs: lint
    if: false  # Re-enable when tests/build_check/CMakeLists.txt exists (Phase 2+)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: canopen
            extra_conf: CONFIG_OMNICAN_CANOPEN=y
          - name: j1939
            extra_conf: CONFIG_OMNICAN_J1939=y
          - name: uds
            extra_conf: CONFIG_OMNICAN_UDS=y CONFIG_ISOTP=y
          - name: obd2
            extra_conf: CONFIG_OMNICAN_OBD2=y CONFIG_ISOTP=y
          - name: all-protocols
            extra_conf: >-
              CONFIG_OMNICAN_CANOPEN=y
              CONFIG_OMNICAN_J1939=y
              CONFIG_OMNICAN_UDS=y
              CONFIG_OMNICAN_OBD2=y
              CONFIG_ISOTP=y

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for west)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install west and Zephyr SDK dependencies
        run: |
          pip install west
          sudo apt-get install -y \
            ninja-build cmake device-tree-compiler \
            gcc-arm-none-eabi

      - name: west init & update
        run: |
          west init -l .
          west update --narrow
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      - name: Build — ${{ matrix.config.name }}
        run: |
          west build -b native_sim tests/build_check \
            -- -DCONFIG_OMNICAN=y ${{ matrix.config.extra_conf }}

  # ---------------------------------------------------------------------------
  # west twister — run ztest unit tests
  # Activated when tests/ has test cases (Phase 2+).
  # ---------------------------------------------------------------------------
  test:
    needs: build
    if: false  # Re-enable when tests/build_check/CMakeLists.txt exists (Phase 2+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for west)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install west and Zephyr SDK
        run: |
          pip install west
          sudo apt-get install -y \
            ninja-build cmake device-tree-compiler \
            gcc-arm-none-eabi

      - name: west init & update
        run: |
          west init -l .
          west update --narrow
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      - name: Run ztest suite via twister
        run: |
          west twister -T tests/ --integration \
            --platform native_sim \
            -v --inline-logs
